name: Tests

# Run the full pytest suite on every commit and PR. No GPU on the runners, so
# the HFT harness exercises its pandas/NumPy fallback (same as a CPU dev box).
on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev + bench extras)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,bench]"

      - name: Run pytest
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.12.11

      - name: Run ruff
        run: ruff check .
